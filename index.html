<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Simple Calculator</title>
    <style>
        /* একদম কম এবং প্রয়োজনীয় CSS */
        body { font-family: Arial, sans-serif; display: flex; justify-content: center; align-items: center; height: 100vh; background-color: #f0f0f0; margin: 0; }
        .calc { background: #fff; padding: 20px; border-radius: 10px; box-shadow: 0px 4px 10px rgba(0,0,0,0.1); }
        input { width: 100%; height: 50px; font-size: 20px; text-align: right; margin-bottom: 10px; box-sizing: border-box; padding: 5px; }
        .buttons { display: grid; grid-template-columns: repeat(4, 1fr); gap: 10px; }
        button { height: 50px; font-size: 18px; cursor: pointer; border: 1px solid #ddd; border-radius: 5px; background: #fafafa; }
        button:active { background: #eee; }
    </style>
</head>
<body>

    <div class="calc">
        <input type="text" id="screen" readonly>
        <div class="buttons">
            <button onclick="clearScreen()">C</button>
            <button onclick="press('/')">/</button>
            <button onclick="press('*')">*</button>
            <button onclick="press('-')">-</button>
            <button onclick="press('7')">7</button>
            <button onclick="press('8')">8</button>
            <button onclick="press('9')">9</button>
            <button onclick="press('+')">+</button>
            <button onclick="press('4')">4</button>
            <button onclick="press('5')">5</button>
            <button onclick="press('6')">6</button>
            <button onclick="calculate()">=</button>
            <button onclick="press('1')">1</button>
            <button onclick="press('2')">2</button>
            <button onclick="press('3')">3</button>
            <button onclick="press('0')">0</button>
        </div>
    </div>

    <script>
        const screen = document.getElementById('screen');
        const press = (val) => screen.value += val;
        const clearScreen = () => screen.value = '';
        const calculate = () => { try { screen.value = eval(screen.value); } catch { screen.value = 'Error'; } };
    </script>

</body>
</html>
